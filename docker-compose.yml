# AyuAahar - Docker Compose Configuration
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ayuaahar-db
    environment:
      POSTGRES_USER: ayuaahar
      POSTGRES_PASSWORD: ayuaahar123
      POSTGRES_DB: ayuaahar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayuaahar -d ayuaahar"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: ayuaahar-backend
    environment:
      DATABASE_URL: postgresql://ayuaahar:ayuaahar123@db:5432/ayuaahar
      SECRET_KEY: your-super-secret-key-change-this-in-production
      FLASK_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -c 'from app import create_app, db; app = create_app(); app.app_context().push(); db.create_all()' &&
             python app.py"

  frontend:
    image: nginx:alpine
    container_name: ayuaahar-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
